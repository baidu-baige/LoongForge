# X-VLA RoboTwin-2.0 task-success template (open-source).
# Verified: adjust_bottle / demo_clean + official ee6d_dual protocol.
#
# Open weight: https://huggingface.co/2toINF/X-VLA-RoboTwin2
# Protocol: domain_id=6, action_bridge=ee6d_dual, take_action(action_type='ee')
#
# Optional overrides (edit this file or copy it):
#   task_name: other RoboTwin tasks (same ee protocol if trained that way)
#   task_config: demo_clean | demo_randomized | ...
#   episodes_per_task / max_steps / start_seed
#   server.random_init: true + max_steps: 5  — RPC/link smoke without real weights
#   run.disable_eval_video_log: false        — enable official mp4 if disk allows

benchmark:
  name: robotwin
  task_name: adjust_bottle  # optional: other RoboTwin task names
  task_config: demo_clean
  start_seed: 100001
  episodes_per_task: 1
  max_steps: 300
  disable_expert_check: false
  domain_id: 6
  action_bridge: ee6d_dual

model:
  backend: loongforge
  model_type: xvla
  action_mode: ee6d
  num_actions: 30
  action_horizon: 30
  max_action_dim: 20
  real_action_dim: 20

server:
  host: 127.0.0.1
  port: 13223
  health_port: 13224
  python: /path/to/loongforge/bin/python
  log: /path/to/LoongForge-VLA/loongforge/embodied/eval/reports/xvla/robotwin/adjust_bottle_smoke/policy_server.log
  start_timeout_sec: 2400
  random_init: false
  # random_init: true   # optional: link smoke without ckpt (pair with max_steps: 5)
  ckpt_path: /path/to/X-VLA-RoboTwin2
  processor_path: /path/to/X-VLA-RoboTwin2
  tokenizer_path: /path/to/X-VLA-RoboTwin2
  dataset_statistics_path: ""
  use_bf16: false
  loongforge_root: /path/to/LoongForge-VLA
  state_format: ee6d

env:
  eval_root: /path/to/LoongForge-VLA/loongforge/embodied/eval
  robotwin_root: /path/to/RoboTwin
  robotwin_python: /path/to/robotwin/bin/python

run:
  output_dir: /path/to/LoongForge-VLA/loongforge/embodied/eval/reports/xvla/robotwin/adjust_bottle_smoke
  seed: 0
  ckpt_setting: loongforge_xvla_robotwin2
  worker_local_files: true
  disable_eval_video_log: true
  keep_config: true
  timestamped_output: false

timeouts:
  policy_call_ms: 600000
  per_step_sec: 600
  per_episode_sec: 3600
