# X-VLA LIBERO object smoke (internal one-click).
# Verified: libero_object + /ssd1/sunyuehang/xvla-libero (~94/100 full suite).
#
# Optional overrides (edit in place):
#   suite: libero_object | libero_spatial | libero_goal | libero_10
#   max_tasks / episodes_per_task: multi-task / multi-episode
#   max_steps: raise for harder suites
#   run.save_trace / run.save_replay: false to save disk

benchmark:
  name: libero
  suite: libero_object  # optional: libero_spatial | libero_goal | libero_10
  max_tasks: 1          # optional: 0 / larger for full suite
  episodes_per_task: 1  # optional: e.g. 10 for full regression
  max_steps: 800
  num_steps_wait: 10
  continuous_gripper: true
  domain_id: 3
  action_postprocess: ee6d_to_axis_angle
  control_mode: absolute  # LIBERO OSC; auto|absolute|delta

model:
  backend: loongforge
  model_type: xvla
  action_mode: ee6d
  num_actions: 30
  action_horizon: 30
  max_action_dim: 20
  real_action_dim: 20

server:
  host: 127.0.0.1
  port: 13183
  health_port: 13184
  python: /workspace/miniconda3/envs/loongforge/bin/python
  log: /workspace/LoongForge-VLA/loongforge/embodied/eval/reports/xvla/libero/libero_weight_object_smoke/policy_server.log
  start_timeout_sec: 2400
  ckpt_path: /ssd1/sunyuehang/xvla-libero
  processor_path: /ssd1/sunyuehang/xvla-libero
  tokenizer_path: /ssd1/sunyuehang/xvla-libero
  dataset_statistics_path: ""
  use_bf16: false
  loongforge_root: /workspace/LoongForge-VLA
  state_format: ee6d
  chunk_execute_steps: 10

env:
  eval_root: /workspace/LoongForge-VLA/loongforge/embodied/eval
  libero_config_path: /ssd1/sunyuehang/vla_eval_runs/libero_config
  mujoco_gl: osmesa
  pyopengl_platform: osmesa
  ld_library_path: /ssd1/opt/nvidia_lib

run:
  output_dir: /workspace/LoongForge-VLA/loongforge/embodied/eval/reports/xvla/libero/libero_weight_object_smoke
  seed: 7
  save_trace: true
  save_replay: true
  timestamped_output: false

timeouts:
  policy_call_ms: 600000
  per_step_sec: 600
  per_episode_sec: 3600
