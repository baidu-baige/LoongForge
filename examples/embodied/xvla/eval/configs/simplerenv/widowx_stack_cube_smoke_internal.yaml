# X-VLA SimplerEnv WidowX task-success (internal one-click).
# Weight: /ssd1/sunyuehang/X-VLA-WidowX
# Protocol: domain_id=0, abs EE, ee6d_to_simpler_abs_euler (see public YAML).
# SimplerEnv local tree already patched (SIMPLERENV_PATCH_en.md).
#
# Optional: task_name / max_steps — see public YAML comments.

benchmark:
  name: simplerenv
  task_name: widowx_stack_cube  # optional: widowx_put_eggplant_in_basket | widowx_carrot_on_plate | widowx_spoon_on_towel
  robot_setup: widowx
  scene_name: bridge_table_1_v1
  rgb_overlay_path: /workspace/SimplerEnv/ManiSkill2_real2sim/data/real_inpainting/bridge_real_eval_1.png
  sim_freq: 500
  control_freq: 5
  control_mode: arm_pd_ee_target_base_pose_gripper_pd_joint_pos
  action_scale: 1.0
  rotation_mode: euler
  max_steps: 1200
  success_settle_steps: 0
  robot_init_x: 0.147
  robot_init_y: 0.028
  domain_id: 0
  action_postprocess: ee6d_to_simpler_abs_euler

model:
  backend: loongforge
  model_type: xvla
  action_mode: ee6d
  num_actions: 30
  action_horizon: 30
  max_action_dim: 20
  real_action_dim: 20

server:
  host: 127.0.0.1
  port: 13213
  health_port: 13214
  python: /workspace/miniconda3/envs/loongforge/bin/python
  log: /workspace/LoongForge-VLA/loongforge/embodied/eval/reports/xvla/simplerenv/widowx_stack_cube_smoke/policy_server.log
  start_timeout_sec: 2400
  random_init: false
  ckpt_path: /ssd1/sunyuehang/X-VLA-WidowX
  processor_path: /ssd1/sunyuehang/X-VLA-WidowX
  tokenizer_path: /ssd1/sunyuehang/X-VLA-WidowX
  dataset_statistics_path: ""
  use_bf16: false
  loongforge_root: /workspace/LoongForge-VLA
  state_format: ee6d

env:
  eval_root: /workspace/LoongForge-VLA/loongforge/embodied/eval
  simplerenv_root: /workspace/SimplerEnv
  ld_library_path: /ssd1/opt/nvidia_lib
  nvidia_lib_dir: /ssd1/opt/nvidia_lib
  nvidia_icd_json: /ssd1/opt/nvidia_lib/10_nvidia.json

run:
  output_dir: /workspace/LoongForge-VLA/loongforge/embodied/eval/reports/xvla/simplerenv/widowx_stack_cube_smoke
  seed: 7
  episode_idx: 0
  obj_episode_id: 0
  save_trace: true
  save_replay: true
  action_ensemble: false
  cfg_scale: 1.0
  disable_action_cache: false
  timestamped_output: false

timeouts:
  policy_call_ms: 600000
  per_step_sec: 600
  per_episode_sec: 3600
