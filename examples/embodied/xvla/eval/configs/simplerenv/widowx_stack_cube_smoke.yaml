# X-VLA SimplerEnv WidowX task-success template (open-source).
# Verified: widowx_stack_cube + 2toINF/X-VLA-WidowX + absolute EE control.
#
# Open weight: https://huggingface.co/2toINF/X-VLA-WidowX
# Protocol: domain_id=0, max_steps=1200, action_postprocess=ee6d_to_simpler_abs_euler,
#   control_mode=arm_pd_ee_target_base_pose_gripper_pd_joint_pos
# REQUIRED: SimplerEnv absolute EE controller (255isWhite fork or patch).
#   See examples/embodied/xvla/eval/SIMPLERENV_PATCH_en.md
#
# Optional overrides (edit this file):
#   task_name / robot_setup / scene_name — other Bridge tasks:
#     widowx_put_eggplant_in_basket + widowx_sink_camera_setup + bridge_table_1_v2
#     widowx_carrot_on_plate / widowx_spoon_on_towel
#   max_steps: 1200 official; lower only for link smoke

benchmark:
  name: simplerenv
  task_name: widowx_stack_cube  # optional: widowx_put_eggplant_in_basket | widowx_carrot_on_plate | widowx_spoon_on_towel
  robot_setup: widowx
  scene_name: bridge_table_1_v1
  rgb_overlay_path: /path/to/SimplerEnv/ManiSkill2_real2sim/data/real_inpainting/bridge_real_eval_1.png
  sim_freq: 500
  control_freq: 5
  control_mode: arm_pd_ee_target_base_pose_gripper_pd_joint_pos
  action_scale: 1.0
  rotation_mode: euler
  max_steps: 1200
  success_settle_steps: 0
  robot_init_x: 0.147
  robot_init_y: 0.028
  domain_id: 0
  action_postprocess: ee6d_to_simpler_abs_euler

model:
  backend: loongforge
  model_type: xvla
  action_mode: ee6d
  num_actions: 30
  action_horizon: 30
  max_action_dim: 20
  real_action_dim: 20

server:
  host: 127.0.0.1
  port: 13213
  health_port: 13214
  python: /path/to/loongforge/bin/python
  log: /path/to/LoongForge-VLA/loongforge/embodied/eval/reports/xvla/simplerenv/widowx_stack_cube_smoke/policy_server.log
  start_timeout_sec: 2400
  random_init: false
  ckpt_path: /path/to/X-VLA-WidowX
  processor_path: /path/to/X-VLA-WidowX
  tokenizer_path: /path/to/X-VLA-WidowX
  dataset_statistics_path: ""
  use_bf16: false
  loongforge_root: /path/to/LoongForge-VLA
  state_format: ee6d

env:
  eval_root: /path/to/LoongForge-VLA/loongforge/embodied/eval
  simplerenv_root: /path/to/SimplerEnv
  ld_library_path: /path/to/nvidia_lib
  nvidia_lib_dir: /path/to/nvidia_lib
  nvidia_icd_json: /path/to/nvidia_icd.json

run:
  output_dir: /path/to/LoongForge-VLA/loongforge/embodied/eval/reports/xvla/simplerenv/widowx_stack_cube_smoke
  seed: 7
  episode_idx: 0
  obj_episode_id: 0
  save_trace: true
  save_replay: true
  action_ensemble: false
  cfg_scale: 1.0
  disable_action_cache: false
  timestamped_output: false

timeouts:
  policy_call_ms: 600000
  per_step_sec: 600
  per_episode_sec: 3600
