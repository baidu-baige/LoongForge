# pi0.5 CALVIN link smoke (internal one-click).
# No CALVIN-domain pi05 weight → server.random_init: true (not task-success).
#
# Optional: suite / num_sequences / max_steps_per_subtask; real ckpt when available
# (see public smoke.yaml comments).

benchmark:
  name: calvin
  suite: task_D_D
  dataset_path: /ssd1/sunyuehang/calvin_debug_dataset
  calvin_config_path: /ssd1/sunyuehang/calvin/calvin_models/conf
  eval_sequences_path: /workspace/starVLA/examples/calvin/eval_files/eval_sequences.json
  num_sequences: 1
  max_steps_per_subtask: 30
  control_hz: 30

model:
  backend: loongforge
  model_type: pi05
  name: loongforge-pi05-calvin-smoke
  action_dim: 7
  state_dim: 7
  action_horizon: 50
  max_action_dim: 32
  max_state_dim: 32
  compile_model: false
  continuous_gripper: false

server:
  host: 127.0.0.1
  port: 12113
  health_port: 12114
  python: /workspace/miniconda3/envs/loongforge/bin/python
  log: /workspace/LoongForge-VLA/loongforge/embodied/eval/reports/pi05/calvin/smoke/policy_server.log
  start_timeout_sec: 900
  random_init: true
  ckpt_path: ""
  dataset_statistics_path: ""
  loongforge_root: /workspace/LoongForge-VLA
  tokenizer_path: /ssd1/huangyi/model/paligemma-3b-pt-224
  use_bf16: false

env:
  eval_root: /workspace/LoongForge-VLA/loongforge/embodied/eval
  mujoco_gl: osmesa
  pyopengl_platform: osmesa
  ld_library_path: /ssd1/opt/nvidia_lib

run:
  output_dir: /workspace/LoongForge-VLA/loongforge/embodied/eval/reports/pi05/calvin/smoke
  seed: 7
  save_trace: true
  save_replay: false

timeouts:
  policy_call_ms: 600000
  per_step_sec: 600
  per_episode_sec: 3000
