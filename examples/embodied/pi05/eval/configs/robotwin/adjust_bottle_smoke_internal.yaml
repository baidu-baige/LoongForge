# pi0.5 RoboTwin-2.0 task-success (internal one-click).
# Weight: /ssd1/sunyuehang/pi0.5_robotwin2
# Train: adapt_to_pi=True, use_delta_joint_actions=True, action_horizon=32, 3 cams
# bridge=pi05_aloha_14d: state adapt_to_pi decode + delta→abs + adapt_to_pi encode
#
# Optional overrides (edit in place):
#   task_name / task_config / episodes_per_task / max_steps / start_seed
#   action_bridge: pi05_aloha_14d (formal) | strict_14d | duplicate_7d (smoke only)
#   server.random_init: true + max_steps: 5 for RPC smoke without weights
#   run.disable_eval_video_log: false to keep official mp4

benchmark:
  name: robotwin
  task_name: adjust_bottle  # optional: other RoboTwin tasks
  task_config: demo_clean
  start_seed: 100001
  episodes_per_task: 1
  max_steps: 300
  disable_expert_check: false
  action_bridge: pi05_aloha_14d  # optional smoke-only: strict_14d | duplicate_7d

model:
  backend: loongforge
  model_type: pi05
  name: loongforge-pi05-robotwin2
  action_dim: 14
  state_dim: 14
  action_horizon: 32
  max_action_dim: 32
  max_state_dim: 32
  compile_model: false
  action_mode: abs

server:
  host: 127.0.0.1
  port: 12495
  health_port: 12496
  python: /workspace/miniconda3/envs/loongforge/bin/python
  log: /workspace/LoongForge-VLA/loongforge/embodied/eval/reports/pi05/robotwin/adjust_bottle_smoke/policy_server.log
  start_timeout_sec: 900
  random_init: false
  # random_init: true   # optional: link smoke without ckpt (pair with max_steps: 5)
  ckpt_path: /ssd1/sunyuehang/pi0.5_robotwin2
  dataset_statistics_path: /workspace/LoongForge-VLA/examples/embodied/pi05/eval/assets/pi05_robotwin2_dataset_stats.json
  loongforge_root: /workspace/LoongForge-VLA
  tokenizer_path: /ssd1/huangyi/model/paligemma-3b-pt-224
  use_bf16: false

env:
  eval_root: /workspace/LoongForge-VLA/loongforge/embodied/eval
  robotwin_root: /workspace/RoboTwin
  robotwin_python: /workspace/miniconda3/envs/robotwin/bin/python

run:
  output_dir: /workspace/LoongForge-VLA/loongforge/embodied/eval/reports/pi05/robotwin/adjust_bottle_smoke
  seed: 0
  ckpt_setting: loongforge_pi05_robotwin2
  worker_local_files: true
  disable_eval_video_log: true
  keep_config: true
  timestamped_output: false

timeouts:
  policy_call_ms: 600000
  per_step_sec: 600
  per_episode_sec: 3600
