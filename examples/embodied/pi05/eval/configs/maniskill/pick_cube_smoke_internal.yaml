# pi0.5 ManiSkill link smoke (internal one-click).
# No ManiSkill-domain pi05 weight → server.random_init: true (not task-success).
#
# Optional: obs_mode state / max_steps / real ckpt when available (see public YAML comments).

benchmark:
  name: maniskill
  task_name: PickCube-v1
  robot_uid: panda
  instruction: pick up the cube
  obs_mode: rgbd  # optional: state (+ allow_dummy_image: true)
  control_mode: pd_ee_delta_pose
  control_freq: 5
  render_mode: rgb_array
  sim_backend: auto
  render_backend: gpu
  camera_name: base_camera
  action_scale: 1.0
  max_steps: 20

model:
  backend: loongforge
  model_type: pi05
  name: loongforge-pi05-maniskill-smoke
  action_dim: 7
  state_dim: 7
  action_horizon: 50
  max_action_dim: 32
  max_state_dim: 32
  compile_model: false

server:
  host: 127.0.0.1
  port: 10093
  health_port: 10094
  start_timeout_sec: 900
  python: /workspace/miniconda3/envs/loongforge/bin/python
  log: /workspace/LoongForge-VLA/loongforge/embodied/eval/reports/pi05/maniskill/pick_cube_smoke/policy_server.log
  random_init: true
  ckpt_path: ""
  dataset_statistics_path: ""
  loongforge_root: /workspace/LoongForge-VLA
  tokenizer_path: /ssd1/huangyi/model/paligemma-3b-pt-224
  use_bf16: false

timeouts:
  policy_call_ms: 20000
  per_step_sec: 20
  per_episode_sec: 600

run:
  seed: 7
  episode_idx: 0
  output_dir: /workspace/LoongForge-VLA/loongforge/embodied/eval/reports/pi05/maniskill/pick_cube_smoke
  save_replay: true
  save_trace: true
  timestamped_output: true
  disable_action_cache: false
  cfg_scale: 1.5

env:
  eval_root: /workspace/LoongForge-VLA/loongforge/embodied/eval
