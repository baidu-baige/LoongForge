model_name: qwen2.5-7b
description: $model_name模型自动化
huggingface_path: https://huggingface.co/Qwen/Qwen2.5-7B
bos_path: bos:/cce-ai-datasets/huggingface.co/Qwen/Qwen2.5-7B
TOTAL_K8S_NODES: 1

# 模型参数
MODEL_RUNNABLE: True # 表示模型是否支持运行, 或者 True / False

# aiak-training-llm 训练的参数
HF_CKPT_PATH: $pfs_path/huggingface.co/Qwen/Qwen2.5-7B
DATA_PATH: $pfs_path/aiak-training-llm/qwen/pile_test/pile-qwen_text_document
TOKENIZER_PATH: $pfs_path/huggingface.co/Qwen/Qwen2.5-7B
CHECKPOINT_PATH: $step1_output_path
TENSORBOARD_PATH: /workspace/tensorboard/$model_name.log

# 训练参数
TENSOR_MODEL_PARALLER_SIZE: 4
PIPELINE_MODEL_PARALLER_SIZE: 2
log_interval: 1
initial_loss_scale: 1024
global_batch_size: 64
micro_batch_size: 1
seq_length: 1024

scenarios:
  - function:
      pretrain:
        Step1:
          CONVERT_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --common_config_path=${convert_checkpoint_path}/config/qwen2.5-7b.json
            --tensor_model_parallel_size=${TENSOR_MODEL_PARALLER_SIZE}
            --pipeline_model_parallel_size=${PIPELINE_MODEL_PARALLER_SIZE}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${CHECKPOINT_PATH}
            --no_load_optim
            --no_save_optim
            --safetensors'
        Step2:
          MODEL_ARGS: '
            --model-name qwen2.5-7b
            --rotary-base 1000000
            --rotary-seq-len-interpolation-factor 1'
          DATA_ARGS: '
            --tokenizer-type HFTokenizer
            --hf-tokenizer-path $TOKENIZER_PATH
            --eod-mask-loss
            --data-path $DATA_PATH
            --split 99,1,0'
          TRAINING_ARGS: '
            --training-phase pretrain
            --seq-length ${seq_length}
            --max-position-embeddings 32768
            --init-method-std 0.006
            --micro-batch-size ${micro_batch_size}
            --global-batch-size ${global_batch_size}
            --lr 1.0e-5
            --min-lr 1.0e-6
            --clip-grad 1.0
            --weight-decay 0.1
            --optimizer adam
            --adam-beta1 0.9
            --adam-beta2 0.95
            --adam-eps 1e-08
            --norm-epsilon 1e-6
            --train-iters ${train_iters}
            --lr-decay-iters 500000
            --lr-decay-style cosine
            --lr-warmup-fraction 0.002
            --initial-loss-scale ${initial_loss_scale}
            --bf16
            --load $CHECKPOINT_PATH
            --save-interval 5000
            --eval-interval 1000
            --eval-iters 0'
            # --save ${step1_output_path}
          MODEL_PARALLEL_ARGS: '
            --tensor-model-parallel-size ${TENSOR_MODEL_PARALLER_SIZE}
            --pipeline-model-parallel-size ${PIPELINE_MODEL_PARALLER_SIZE}
            --use-distributed-optimizer
            --overlap-grad-reduce
            --overlap-param-gather
            --distributed-backend nccl'
          LOGGING_ARGS: '
            --log-interval ${log_interval}
            --tensorboard-dir $TENSORBOARD_PATH
            --log-timers-to-tensorboard'
          loss_in_value: '[
              1.761087E+00
              1.820481E+00
              1.913501E+00
              1.782778E+00
              2.059626E+00
              1.804876E+00
              1.853462E+00
              1.768320E+00
              1.857395E+00
              1.783629E+00
            ]'
  - perf:
      pretrain:
        Step1:
          TENSOR_MODEL_PARALLER_SIZE: 1
          PIPELINE_MODEL_PARALLER_SIZE: 1
        Step2:
          # 性能场景不需要重新生成ckpt，指定ckpt训练
          CHECKPOINT_PATH: no_need_ckpt_path
          TOTAL_K8S_NODES: 4
          TENSOR_MODEL_PARALLER_SIZE: 1
          PIPELINE_MODEL_PARALLER_SIZE: 1
          micro_batch_size: 1
          global_batch_size: 2048
          seq_length: 4096
          initial_loss_scale: 65536

tasks:
  check_correctness_task: True
  check_perfness_task: True