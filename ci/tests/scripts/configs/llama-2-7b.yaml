model_name: llama-2-7b
description: $model_name模型自动化
huggingface_path: https://huggingface.co/meta-llama/Llama-2-7b-hf
bos_path: bos:/cce-ai-datasets/huggingface.co/meta-llama/Llama-2-7b-hf
TOTAL_K8S_NODES: 1

# 模型参数
MODEL_RUNNABLE: True # 表示模型是否支持运行, 或者 True / False

# aiak-training-llm 训练的参数
HF_CKPT_PATH: $pfs_path/huggingface.co/meta-llama/Llama-2-7b-hf
DATA_PATH: $pfs_path/aiak-training-llm/llama2/pile_test/pile-llama_text_document
TOKENIZER_PATH: $pfs_path/huggingface.co/meta-llama/Llama-2-7b-hf
CHECKPOINT_PATH: $step1_output_path
TENSORBOARD_PATH: /workspace/tensorboard/$model_name.log

# 训练参数
TENSOR_MODEL_PARALLER_SIZE: 1
PIPELINE_MODEL_PARALLER_SIZE: 1
log_interval: 1
initial_loss_scale: 1024
global_batch_size: 64
precision: fp16

scenarios:
  - function:
      pretrain:
        Step1:
          CONVERT_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --common_config_path=${convert_checkpoint_path}/config/llama2-7b.json
            --tensor_model_parallel_size=${TENSOR_MODEL_PARALLER_SIZE}
            --pipeline_model_parallel_size=${PIPELINE_MODEL_PARALLER_SIZE}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${CHECKPOINT_PATH}
            --no_save_optim'
        Step2:
          MODEL_ARGS: '
            --model-name llama2-7b'
          DATA_ARGS: '
            --tokenizer-type HFTokenizer
            --hf-tokenizer-path $TOKENIZER_PATH
            --data-path $DATA_PATH
            --split 949,50,1'
          TRAINING_ARGS: '
            --training-phase pretrain
            --seq-length 4096
            --max-position-embeddings 4096
            --init-method-std 0.01
            --micro-batch-size 1
            --global-batch-size ${global_batch_size}
            --lr 0.0002
            --min-lr 1.0e-5
            --clip-grad 1.0
            --weight-decay 0.01
            --optimizer adam
            --adam-beta1 0.9
            --adam-beta2 0.95
            --adam-eps 1e-05
            --norm-epsilon 1e-6
            --train-iters ${train_iters}
            --lr-decay-iters 500000
            --lr-decay-style cosine
            --lr-warmup-fraction 0.002
            --initial-loss-scale ${initial_loss_scale}
            --${precision}
            --load $CHECKPOINT_PATH
            --save-interval 5000
            --eval-interval 1000
            --eval-iters 0'
            # --save ${step1_output_path}
          MODEL_PARALLEL_ARGS: '
            --tensor-model-parallel-size ${TENSOR_MODEL_PARALLER_SIZE}
            --pipeline-model-parallel-size ${PIPELINE_MODEL_PARALLER_SIZE}
            --use-distributed-optimizer
            --overlap-grad-reduce
            --overlap-param-gather
            --distributed-backend nccl'
          LOGGING_ARGS: '
            --log-interval ${log_interval}
            --tensorboard-dir $TENSORBOARD_PATH
            --log-timers-to-tensorboard'
          loss_in_value: '[
              1.479290E+00
              1.577402E+00
              1.626930E+00
              1.634437E+00
              1.571740E+00
              1.579029E+00
              1.603899E+00
              1.570391E+00
              1.603704E+00
              1.637664E+00
            ]'
        Step3:
          precision: bf16
          MODEL_PARALLEL_ARGS: '
            --tensor-model-parallel-size ${TENSOR_MODEL_PARALLER_SIZE}
            --pipeline-model-parallel-size ${PIPELINE_MODEL_PARALLER_SIZE}
            --use-distributed-optimizer
            --overlap-grad-reduce
            --overlap-param-gather
            --offload-optimizer manual
            --offload-optimizer-percent 1.0
            --distributed-backend nccl'
      sft:
        Step1:
          TENSOR_MODEL_PARALLER_SIZE: 4
          PIPELINE_MODEL_PARALLER_SIZE: 2
          CONVERT_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --common_config_path=${convert_checkpoint_path}/config/llama2-7b.json
            --tensor_model_parallel_size=${TENSOR_MODEL_PARALLER_SIZE}
            --pipeline_model_parallel_size=${PIPELINE_MODEL_PARALLER_SIZE}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${CHECKPOINT_PATH}
            --no_save_optim'
        Step2:
          MODEL_ARGS: '
            --model-name llama2-7b'
          DATA_ARGS: '
            --tokenizer-type HFTokenizer
            --hf-tokenizer-path $TOKENIZER_PATH
            --data-path $scripts_root_path/datasets/sft_aplaca_zh_data.json
            --split 100,0,0'
          SFT_ARGS: '
            --chat-template llama2
            --padding-side right
            --sft-num-preprocess-workers 16
            --no-check-for-nan-in-loss-and-grad
            --sft-dataset-config $scripts_root_path/datasets/sft_dataset_config.json
            --sft-dataset default
            --sft-data-streaming
            --train-on-prompt
            --eod-mask-loss'
            # --num-workers 1
            # --packing-sft-data
          TRAINING_ARGS: '
            --training-phase sft
            --seq-length 4096
            --max-position-embeddings 4096
            --init-method-std 0.01
            --micro-batch-size 1
            --global-batch-size ${global_batch_size}
            --lr 0.0002
            --min-lr 1.0e-5
            --clip-grad 1.0
            --weight-decay 0.01
            --optimizer adam
            --adam-beta1 0.9
            --adam-beta2 0.95
            --adam-eps 1e-05
            --norm-epsilon 1e-6
            --train-iters ${train_iters}
            --lr-decay-iters 500000
            --lr-decay-style cosine
            --lr-warmup-fraction 0.002
            --initial-loss-scale ${initial_loss_scale}
            --${precision}
            --load $CHECKPOINT_PATH
            --save-interval 5000
            --eval-interval 1000
            --eval-iters 0'
          MODEL_PARALLEL_ARGS: '
            --tensor-model-parallel-size ${TENSOR_MODEL_PARALLER_SIZE}
            --pipeline-model-parallel-size ${PIPELINE_MODEL_PARALLER_SIZE}
            --use-distributed-optimizer
            --overlap-grad-reduce
            --overlap-param-gather
            --distributed-backend nccl'
          LOGGING_ARGS: '
            --log-interval ${log_interval}
            --tensorboard-dir $TENSORBOARD_PATH
            --log-timers-to-tensorboard'
          loss_in_value: '[
              1.494278E+00
              1.744719E+00
              1.653718E+00
              1.595445E+00
              1.619495E+00
              1.572784E+00
              1.509958E+00
              1.566243E+00
              1.488530E+00
              1.390125E+00
            ]'
        Step3:
          precision: bf16
          MODEL_PARALLEL_ARGS: '
            --tensor-model-parallel-size ${TENSOR_MODEL_PARALLER_SIZE}
            --pipeline-model-parallel-size ${PIPELINE_MODEL_PARALLER_SIZE}
            --use-distributed-optimizer
            --overlap-grad-reduce
            --overlap-param-gather
            --offload-optimizer manual
            --offload-optimizer-percent 1.0
            --distributed-backend nccl'
  - perf:
      pretrain:
        Step1:
          TENSOR_MODEL_PARALLER_SIZE: 1
          PIPELINE_MODEL_PARALLER_SIZE: 1
        Step2:
          # 性能场景默认指定不存在ckpt即可
          CHECKPOINT_PATH: no_need_ckpt_path
          TOTAL_K8S_NODES: 4
          TENSOR_MODEL_PARALLER_SIZE: 4
          PIPELINE_MODEL_PARALLER_SIZE: 4
          global_batch_size: 1024
          initial_loss_scale: 16
  - preprocess_data:
      pretrain:
        PREPROCESS_DATA_PATH: ${aiak_training_path}/tools/data_preprocess/preprocess_pretrain_data.py
        output_prefix: /workspace/pile_test_pretrain/$model_name/pile-test
        train_json_file_name: '$scripts_root_path/datasets/pretrain_train.jsonl'
        PREPROCESS_DATA_ARGS: '
          --input ${train_json_file_name}
          --output-prefix ${output_prefix}
          --tokenizer-type HFTokenizer
          --hf-tokenizer-path ${TOKENIZER_PATH}
          --json-keys text
          --workers 50
          --append-eod'
      sft:
        PREPROCESS_DATA_PATH: ${aiak_training_path}/tools/data_preprocess/preprocess_sft_data.py
        output_prefix: /workspace/pile_test_sft/$model_name
        train_json_file_name: '$scripts_root_path/datasets/sft_aplaca_zh_data.json'
        PREPROCESS_DATA_ARGS: '
          --input ${train_json_file_name}
          --output ${output_prefix}
          --seq-length 2048
          --chat-template llama2
          --tokenizer-type HFTokenizer
          --hf-tokenizer-path ${TOKENIZER_PATH}
          --workers 50'
tasks:
  check_correctness_task: True
  check_perfness_task: True
  check_precess_data_task: True
