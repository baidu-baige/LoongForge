model_name: llama-3-8b
description: $model_name模型自动化
huggingface_path: https://huggingface.co/meta-llama/Meta-Llama-3-8B
bos_path: bos:/cce-ai-models/huggingface.co/meta-llama/Meta-Llama-3-8B
TOTAL_K8S_NODES: 1

# 模型参数
MODEL_RUNNABLE: True # 表示模型是否支持运行, 或者 True / False

# aiak-training-llm 训练的参数
HF_CKPT_PATH: $pfs_path/huggingface.co/meta-llama/Meta-Llama-3-8B
DATA_PATH: $pfs_path/aiak-training-llm/llama3/pile_test/pile-llama_text_document
TOKENIZER_PATH: $pfs_path/huggingface.co/meta-llama/Meta-Llama-3-8B
CHECKPOINT_PATH: $step1_output_path
TENSORBOARD_PATH: /workspace/tensorboard/$model_name.log

# 训练参数
TENSOR_MODEL_PARALLER_SIZE: 2
PIPELINE_MODEL_PARALLER_SIZE: 2
log_interval: 1
initial_loss_scale: 1024
global_batch_size: 64

scenarios:
  - function:
      pretrain:
        Step1:
          CONVERT_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --common_config_path=${convert_checkpoint_path}/config/llama3-8b.json
            --tensor_model_parallel_size=${TENSOR_MODEL_PARALLER_SIZE}
            --pipeline_model_parallel_size=${PIPELINE_MODEL_PARALLER_SIZE}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${CHECKPOINT_PATH}
            --safetensors
            --no_save_optim
            --no_load_optim'
        Step2:
          MODEL_ARGS: '
            --model-name llama3-8b
            --rotary-base 500000'
          DATA_ARGS: '
            --tokenizer-type HFTokenizer
            --hf-tokenizer-path $TOKENIZER_PATH
            --data-path $DATA_PATH
            --split 949,50,1'
          TRAINING_ARGS: '
            --training-phase pretrain
            --seq-length 8192
            --max-position-embeddings 8192
            --init-method-std 0.02
            --micro-batch-size 1
            --global-batch-size ${global_batch_size}
            --lr 0.0002
            --min-lr 1.0e-5
            --clip-grad 1.0
            --weight-decay 0.01
            --optimizer adam
            --adam-beta1 0.9
            --adam-beta2 0.95
            --adam-eps 1e-05
            --norm-epsilon 1e-05
            --train-iters ${train_iters}
            --lr-decay-iters 500000
            --lr-decay-style cosine
            --lr-warmup-fraction 0.002
            --initial-loss-scale ${initial_loss_scale}
            --bf16
            --load $CHECKPOINT_PATH
            --save-interval 5000
            --eval-interval 1000
            --eval-iters 0'
            # --save ${step1_output_path}
          MODEL_PARALLEL_ARGS: '
            --tensor-model-parallel-size ${TENSOR_MODEL_PARALLER_SIZE}
            --pipeline-model-parallel-size ${PIPELINE_MODEL_PARALLER_SIZE}
            --context-parallel-size 2
            --use-distributed-optimizer
            --overlap-grad-reduce
            --overlap-param-gather
            --distributed-backend nccl'
          LOGGING_ARGS: '
            --log-interval ${log_interval}
            --tensorboard-dir $TENSORBOARD_PATH
            --log-timers-to-tensorboard'
          loss_in_value: '[
              1.766067E+00
              1.771964E+00
              1.693765E+00
              1.796181E+00
              1.697916E+00
              1.681316E+00
              1.773814E+00
              1.693807E+00
              1.685512E+00
              1.861043E+00
            ]'
  - perf:
      pretrain:
        Step1:
          TENSOR_MODEL_PARALLER_SIZE: 1
          PIPELINE_MODEL_PARALLER_SIZE: 1
        Step2:
          # 性能场景默认指定不存在ckpt即可
          CHECKPOINT_PATH: no_need_ckpt_path
          TOTAL_K8S_NODES: 4
          TENSOR_MODEL_PARALLER_SIZE: 1
          PIPELINE_MODEL_PARALLER_SIZE: 1
          global_batch_size: 1024
          initial_loss_scale: 16

tasks:
  check_correctness_task: True
  check_perfness_task: True