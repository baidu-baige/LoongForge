model_name: qwen2-vl-7b
description: $model_name模型自动化
huggingface_path: https://huggingface.co/Qwen/Qwen2-VL-7B-Instruct
bos_path: bos:/cce-ai-models/huggingface.co/Qwen/Qwen2-VL-7B-Instruct
TOTAL_K8S_NODES: 1

# 模型参数
MODEL_RUNNABLE: True # 表示模型是否支持运行, 或者 True / False

# aiak-training-llm 训练的参数
HF_CKPT_PATH: $pfs_path/huggingface.co/Qwen/Qwen2-VL-7B-Instruct
DATA_PATH: $pfs_path/aiak-training-llm/dataset/mllm/demo/wds/
TOKENIZER_PATH: $pfs_path/huggingface.co/Qwen/Qwen2-VL-7B-Instruct
CHECKPOINT_PATH: $step1_output_path
TENSORBOARD_PATH: /workspace/tensorboard/$model_name.log

# 训练参数
TENSOR_MODEL_PARALLER_SIZE: 1
PIPELINE_MODEL_PARALLER_SIZE: 1
log_interval: 1
initial_loss_scale: 1024
micro_batch_size: 1
global_batch_size: 128
seq_length: 4096
LANGUAGE_MODEL_PATH: $step1_output_path/language-expert-mcore
VISION_MODEL_PATH: $step1_output_path/vision-model-mcore
ADAPTER_PATH: $step1_output_path/adapter-mcore
PATCH_PATH: $step1_output_path/patch-mcore

scenarios:
  - function:
      sft:
        Step1:
          LANGUAGE_MODEL_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --common_config_path=${convert_checkpoint_path}/config/qwen2-vl-7b/qwen2.json
            --tensor_model_parallel_size=${TENSOR_MODEL_PARALLER_SIZE}
            --pipeline_model_parallel_size=${PIPELINE_MODEL_PARALLER_SIZE}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${LANGUAGE_MODEL_PATH}
            --no_load_optim
            --no_save_optim
            --safetensors'
          VISION_MODEL_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --common_config_path=${convert_checkpoint_path}/config/qwen2-vl-7b/vision-model.json
            --tensor_model_parallel_size=${TENSOR_MODEL_PARALLER_SIZE}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${VISION_MODEL_PATH}
            --no_load_optim
            --no_save_optim
            --safetensors'
          ADAPTER_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --common_config_path=${convert_checkpoint_path}/config/qwen2-vl-7b/adapter.json
            --tensor_model_parallel_size=${TENSOR_MODEL_PARALLER_SIZE}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${ADAPTER_PATH}'
          PATCH_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --common_config_path=${convert_checkpoint_path}/config/qwen2-vl-7b/vision-patch.json
            --tensor_model_parallel_size=${TENSOR_MODEL_PARALLER_SIZE}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${PATCH_PATH}'
          MERGE_ARGS: '
            --megatron_path ${megatron_path}
            --language_model_path ${LANGUAGE_MODEL_PATH}/release
            --vision_model_path ${VISION_MODEL_PATH}/release
            --vision_patch ${ADAPTER_PATH}/release
            --adapter_path ${PATCH_PATH}/release
            --save_ckpt_path ${CHECKPOINT_PATH}/release
            --tensor_model_parallel_size ${TENSOR_MODEL_PARALLER_SIZE}
            --pipeline_model_parallel_size ${PIPELINE_MODEL_PARALLER_SIZE}'
        Step2:
          MODEL_ARGS: '
            --model-name qwen2-vl-7b'
          DATA_ARGS: '
            --tokenizer-type HFTokenizer
            --hf-tokenizer-path $TOKENIZER_PATH
            --data-path $DATA_PATH
            --dataloader-type external
            --split 100,0,0
            --num-workers 16
            --chat-template qwen2-vl'
          TRAINING_ARGS: '
            --training-phase sft
            --trainable-modules language_model adapter
            --seq-length ${seq_length}
            --max-position-embeddings 4096
            --init-method-std 0.02
            --micro-batch-size ${micro_batch_size}
            --global-batch-size ${global_batch_size}
            --lr 0.0002
            --min-lr 1.0e-5
            --clip-grad 1.0
            --weight-decay 0.01
            --optimizer adam
            --adam-beta1 0.9
            --adam-beta2 0.95
            --adam-eps 1e-05
            --norm-epsilon 1e-06
            --train-iters ${train_iters}
            --lr-decay-iters 50000
            --lr-decay-style cosine
            --lr-warmup-fraction 0.002
            --initial-loss-scale ${initial_loss_scale}
            --bf16
            --load $CHECKPOINT_PATH
            --ckpt-format torch
            --dataloader-save ${CHECKPOINT_PATH}/dataloader
            --save-interval 5000
            --no-load-optim
            --no-load-rng'
            # --save ${step1_output_path}
          MODEL_PARALLEL_ARGS: '
            --attention-backend flash
            --tensor-model-parallel-size ${TENSOR_MODEL_PARALLER_SIZE}
            --pipeline-model-parallel-size ${PIPELINE_MODEL_PARALLER_SIZE}
            --use-distributed-optimizer
            --overlap-grad-reduce
            --overlap-param-gather
            --distributed-backend nccl'
          LOGGING_ARGS: '
            --log-interval ${log_interval}
            --tensorboard-dir $TENSORBOARD_PATH
            --log-timers-to-tensorboard'
          loss_in_value: '[
              1.941948E+00
              1.921066E+00
              1.916282E+00
              1.702542E+00
              1.243891E+00
              9.119769E-01
              6.227867E-01
              2.897384E-01
              2.008902E-01
              2.232531E-01
            ]'

tasks:
  check_correctness_task: True
  check_perfness_task: False