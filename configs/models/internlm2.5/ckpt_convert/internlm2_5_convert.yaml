hydra:
  searchpath:
    - file://${oc.env:LOONGFORGE_PATH}/configs/models/

defaults:
  - internlm2.5@module: ??? 
  - _self_

  
args:
  common:
    num_layers: ${module.num_layers}
    hidden_size: ${module.hidden_size}
    ffn_hidden_size: ${module.ffn_hidden_size}
    num_attention_heads: ${module.num_attention_heads}
    num_key_value_heads: ${module.num_query_groups}
    vocab_size: ${module.vocab_size}
  huggingface:
    architectures: [InternLM2ForCausalLM]
    model_type: internlm2
    tie_word_embeddings: false
    hidden_size: ${module.hidden_size}
    intermediate_size: ${module.ffn_hidden_size}
    num_attention_heads: ${module.num_attention_heads}
    num_hidden_layers: ${module.num_layers}
    num_key_value_heads: ${module.num_query_groups}    
  mcore:
    use_rotary_position_embeddings: true
    add_embedding_padding: true
    transpose_mlp_dense: true
    transpose_query_key_value: false
    untie_embeddings_and_output_weights: ${module.untie_embeddings_and_output_weights}

  
name_map:
  huggingface:
    word_embeddings: language_model.model.tok_embeddings
    transformer: language_model.model
    layer_prefix: layers
    input_layernorm: attention_norm
    attention.query_key_value: attention.wqkv
    attention.dense: attention.wo
    post_attention_layernorm: ffn_norm
    mlp.dense_h_to_4h: [feed_forward.w1, feed_forward.w3]
    mlp.dense_4h_to_h: feed_forward.w2
    final_layernorm: language_model.model.norm
    word_embeddings_for_head: language_model.output
  mcore:
    word_embeddings: language_model.embedding.word_embeddings
    word_position_embeddings: language_model.embedding.position_embeddings
    transformer: model
    layer_prefix: language_model.decoder.layers
    input_layernorm:
      name: self_attention.linear_qkv
      is_layernorm: true
    attention.query_key_value:
      name: self_attention.linear_qkv
      extra: true
    attention.dense:
      name: self_attention.linear_proj
      extra: true
    post_attention_layernorm:
      name: mlp.linear_fc1
      is_layernorm: true
    mlp.dense_h_to_4h:
      name: mlp.linear_fc1
      extra: true
    mlp.dense_4h_to_h:
      name: mlp.linear_fc2
      extra: true
    final_layernorm:
      name: language_model.decoder.final_layernorm
      extra: true
    word_embeddings_for_head: language_model.output_layer
    transformer_tpl: model%d

torch_dtype: bfloat16