hydra:
  searchpath:
    - file://${oc.env:LOONGFORGE_PATH}/configs/models/

defaults:
  - deepseek4@module: ???
  - _self_


args:
  common:
    num_layers: ${module.num_layers}
    hidden_size: ${module.hidden_size}
    ffn_hidden_size: ${module.ffn_hidden_size}
    num_attention_heads: ${module.num_attention_heads}
    num_key_value_heads: ${module.num_query_groups}
    vocab_size: ${module.vocab_size_in_config_file}
    num_experts: ${module.num_experts}
    mtp_num_layers: ${module.mtp_num_layers}
    head_dim: ${module.head_dim}
  huggingface:
    mtp_layer_id: 0
  mcore:
    untie_embeddings_and_output_weights: true
    add_embedding_padding: true
    transpose_mlp_dense: true
    transpose_query_key_value: true
name_map:
  huggingface:
    word_embeddings: embed
    transformer: ""
    layer_prefix: layers
    input_layernorm: attn_norm
    attention.q_down: attn.wq_a
    attention.q_up: attn.wq_b
    attention.q_up_layernorm: attn.q_norm
    attention.kv_down: attn.wkv
    attention.kv_norm: attn.kv_norm
    attention.wo_a: attn.wo_a
    attention.wo_b: attn.wo_b
    attention.attn_sink:
      name: attn.attn_sink
      is_direct_name: true
    attention.compressor.wkv: attn.compressor.wkv
    attention.compressor.wgate: attn.compressor.wgate
    attention.compressor.ape:
      name: attn.compressor.ape
      is_direct_name: true
    attention.compressor.norm: attn.compressor.norm
    attention.indexer.compressor.wkv: attn.indexer.compressor.wkv
    attention.indexer.compressor.wgate: attn.indexer.compressor.wgate
    attention.indexer.compressor.ape:
      name: attn.indexer.compressor.ape
      is_direct_name: true
    attention.indexer.compressor.norm: attn.indexer.compressor.norm
    attention.indexer.weights_proj: attn.indexer.weights_proj
    attention.indexer.wq_b: attn.indexer.wq_b
    post_attention_layernorm: ffn_norm
    moe.gate: ffn.gate
    moe.gate.bias: ffn.gate.bias
    moe.gate.tid2eid:
      name: ffn.gate.tid2eid
      is_direct_name: true
    moe.expert: ffn.experts
    moe.shared_expert: ffn.shared_experts
    moe.expert_h_to_4h:
    - w1
    - w3
    moe.shared_expert_h_to_4h:
    - w1
    - w3
    moe.expert_4h_to_h: w2
    moe.shared_expert_4h_to_h: w2
    final_layernorm: norm
    word_embeddings_for_head: head
    hc_attn_fn:
      name: hc_attn_fn
      is_direct_name: true
    hc_attn_base:
      name: hc_attn_base
      is_direct_name: true
    hc_attn_alpha_pre:
      name: hc_attn_alpha_pre
      is_direct_name: true
    hc_attn_alpha_post:
      name: hc_attn_alpha_post
      is_direct_name: true
    hc_attn_alpha_res:
      name: hc_attn_alpha_res
      is_direct_name: true
    hc_ffn_fn:
      name: hc_ffn_fn
      is_direct_name: true
    hc_ffn_base:
      name: hc_ffn_base
      is_direct_name: true
    hc_ffn_alpha_pre:
      name: hc_ffn_alpha_pre
      is_direct_name: true
    hc_ffn_alpha_post:
      name: hc_ffn_alpha_post
      is_direct_name: true
    hc_ffn_alpha_res:
      name: hc_ffn_alpha_res
      is_direct_name: true
    hc_head_fn:
      name: hc_head_fn
      is_direct_name: true
    hc_head_base:
      name: hc_head_base
      is_direct_name: true
    hc_head_scale:
      name: hc_head_scale
      is_direct_name: true
    mtp_transformer: mtp
    mtp_layer_prefix: layers
    mtp_word_embeddings:
      name: mtp.layers.0.emb.tok_emb
      no_layer_id: true
    mtp_enorm: enorm
    mtp_hnorm: hnorm
    mtp_eh_proj: eh_proj
    mtp_e_proj: e_proj
    mtp_h_proj: h_proj
    mtp_norm: norm
    # mtp_head not needed: MTP reuses the main output_layer weight
    # mtp_head: head
    mtp_hc_head_fn:
      name: hc_head_fn
      is_direct_name: true
    mtp_hc_head_base:
      name: hc_head_base
      is_direct_name: true
    mtp_hc_head_scale:
      name: hc_head_scale
      is_direct_name: true
    # MTP per-layer HC attn/ffn params (after preprocessing splits hc_attn_scale -> alpha_pre/post/res)
    mtp_hc_attn_fn:
      name: hc_attn_fn
      is_direct_name: true
    mtp_hc_attn_base:
      name: hc_attn_base
      is_direct_name: true
    mtp_hc_attn_alpha_pre:
      name: hc_attn_alpha_pre
      is_direct_name: true
    mtp_hc_attn_alpha_post:
      name: hc_attn_alpha_post
      is_direct_name: true
    mtp_hc_attn_alpha_res:
      name: hc_attn_alpha_res
      is_direct_name: true
    mtp_hc_ffn_fn:
      name: hc_ffn_fn
      is_direct_name: true
    mtp_hc_ffn_base:
      name: hc_ffn_base
      is_direct_name: true
    mtp_hc_ffn_alpha_pre:
      name: hc_ffn_alpha_pre
      is_direct_name: true
    mtp_hc_ffn_alpha_post:
      name: hc_ffn_alpha_post
      is_direct_name: true
    mtp_hc_ffn_alpha_res:
      name: hc_ffn_alpha_res
      is_direct_name: true
    mtp_moe.gate.bias:
      name: ffn.gate.bias
      is_direct_name: true
    # MTP MoE expert mappings (used when mtp_num_layers > 0 and MTP has MoE)
    mtp_moe.expert_h_to_4h:
    - w1
    - w3
    mtp_moe.expert_4h_to_h: w2
    mtp_moe.shared_expert_h_to_4h:
    - w1
    - w3
    mtp_moe.shared_expert_4h_to_h: w2
  mcore:
    word_embeddings: embedding.word_embeddings
    transformer: model
    layer_prefix: decoder.layers
    mtp_layer_prefix: mtp.layers
    input_layernorm: input_layernorm
    attention.q_down:
      name: self_attention.linear_q_down_proj
      extra: true
      fp8: true
      ignore_tp: true
    attention.q_up:
      name: self_attention.linear_q_up_proj
      extra: true
      fp8: true
    attention.q_up_layernorm:
      name: self_attention.q_layernorm
      extra: true
    attention.kv_down:
      name: self_attention.linear_kv_proj
      extra: true
      fp8: true
      fp8_ignore_tp: true
    attention.kv_norm:
      name: self_attention.kv_layernorm
      extra: true
    attention.wo_a:
      name: self_attention.linear_o_group_proj
      is_direct_name: true
    attention.wo_b:
      name: self_attention.linear_proj
      extra: true
      fp8: true
    attention.attn_sink:
      name: self_attention.core_attention.attn_sink
      is_direct_name: true
    attention.compressor.wkv:
      name: self_attention.core_attention.compressor.linear_wkv
      ignore_tp: true
    attention.compressor.wgate:
      name: self_attention.core_attention.compressor.linear_wgate
      ignore_tp: true
    attention.compressor.ape:
      name: self_attention.core_attention.compressor.ape
      is_direct_name: true
      ignore_tp: true
    attention.compressor.norm:
      name: self_attention.core_attention.compressor.norm
      extra: true
    attention.indexer.compressor.wkv:
      name: self_attention.core_attention.indexer.compressor.linear_wkv
      ignore_tp: true
    attention.indexer.compressor.wgate:
      name: self_attention.core_attention.indexer.compressor.linear_wgate
      ignore_tp: true
    attention.indexer.compressor.ape:
      name: self_attention.core_attention.indexer.compressor.ape
      is_direct_name: true
      ignore_tp: true
    attention.indexer.compressor.norm:
      name: self_attention.core_attention.indexer.compressor.norm
      extra: true
    attention.indexer.weights_proj:
      name: self_attention.core_attention.indexer.linear_weights_proj
      extra: true
      ignore_tp: true
    attention.indexer.wq_b:
      name: self_attention.core_attention.indexer.linear_wq_b
      fp8: true
      extra: true
      fp8_ignore_tp: true
    post_attention_layernorm: pre_mlp_layernorm
    moe.gate: mlp.router
    moe.gate.bias:
      name: mlp.router.expert_bias
      is_direct_name: true
      ignore_tp: true
    moe.gate.tid2eid:
      name: mlp.router.tid2eid
      is_direct_name: true
      ignore_tp: true
    moe.expert: mlp.experts.local_experts
    moe.groupedgemm.expert: mlp.experts
    moe.shared_expert: mlp.shared_experts
    moe.expert_h_to_4h:
      name: linear_fc1
      fp8: true
      extra: true
    moe.shared_expert_h_to_4h:
      name: mlp.shared_experts.linear_fc1
      fp8: true
      extra: true
    moe.expert_4h_to_h:
      name: linear_fc2
      fp8: true
      extra: true
    moe.shared_expert_4h_to_h:
      name: mlp.shared_experts.linear_fc2
      fp8: true
      extra: true
    final_layernorm:
      name: decoder.final_layernorm
      extra: true
    word_embeddings_for_head: output_layer
    transformer_tpl: model%d
    hc_attn_fn:
      name: self_attention_hyper_connection.mapping_proj
      ignore_tp: true
    hc_attn_base:
      name: self_attention_hyper_connection.bias
      is_direct_name: true
      ignore_tp: true
    hc_attn_alpha_pre:
      name: self_attention_hyper_connection.alpha_pre
      is_direct_name: true
      ignore_tp: true
    hc_attn_alpha_post:
      name: self_attention_hyper_connection.alpha_post
      is_direct_name: true
      ignore_tp: true
    hc_attn_alpha_res:
      name: self_attention_hyper_connection.alpha_res
      is_direct_name: true
      ignore_tp: true
    hc_ffn_fn:
      name: mlp_hyper_connection.mapping_proj
      ignore_tp: true
    hc_ffn_base:
      name: mlp_hyper_connection.bias
      is_direct_name: true
      ignore_tp: true
    hc_ffn_alpha_pre:
      name: mlp_hyper_connection.alpha_pre
      is_direct_name: true
      ignore_tp: true
    hc_ffn_alpha_post:
      name: mlp_hyper_connection.alpha_post
      is_direct_name: true
      ignore_tp: true
    hc_ffn_alpha_res:
      name: mlp_hyper_connection.alpha_res
      is_direct_name: true
      ignore_tp: true
    hc_head_fn:
      name: decoder.head_hyper_connection.hc_head_fn
      is_direct_name: true
      ignore_tp: true
    hc_head_base:
      name: decoder.head_hyper_connection.hc_head_base
      is_direct_name: true
      ignore_tp: true
    hc_head_scale:
      name: decoder.head_hyper_connection.hc_head_scale
      is_direct_name: true
      ignore_tp: true
    mtp_word_embeddings: embedding.word_embeddings
    mtp_enorm: enorm
    mtp_hnorm: hnorm
    mtp_e_proj:
      name: e_proj
      dtype: bf16
    mtp_h_proj:
      name: h_proj
      dtype: bf16
    mtp_norm: final_layernorm
    # mtp_head not needed: MTP reuses the main output_layer weight
    # mtp_head: output_head
    # PR #4518: per-MTP-layer learned output contract (3 params: hc_head_fn/base/scale).
    mtp_hc_head_fn:
      name: hc_head_fn
      is_direct_name: true
      ignore_tp: true
    mtp_hc_head_base:
      name: hc_head_base
      is_direct_name: true
      ignore_tp: true
    mtp_hc_head_scale:
      name: hc_head_scale
      is_direct_name: true
      ignore_tp: true
    # MTP per-layer HC attn/ffn -> mcore self_attention_hyper_connection/mlp_hyper_connection
    mtp_hc_attn_fn:
      name: transformer_layer.self_attention_hyper_connection.mapping_proj
      ignore_tp: true
    mtp_hc_attn_base:
      name: transformer_layer.self_attention_hyper_connection.bias
      is_direct_name: true
      ignore_tp: true
    mtp_hc_attn_alpha_pre:
      name: transformer_layer.self_attention_hyper_connection.alpha_pre
      is_direct_name: true
      ignore_tp: true
    mtp_hc_attn_alpha_post:
      name: transformer_layer.self_attention_hyper_connection.alpha_post
      is_direct_name: true
      ignore_tp: true
    mtp_hc_attn_alpha_res:
      name: transformer_layer.self_attention_hyper_connection.alpha_res
      is_direct_name: true
      ignore_tp: true
    mtp_hc_ffn_fn:
      name: transformer_layer.mlp_hyper_connection.mapping_proj
      ignore_tp: true
    mtp_hc_ffn_base:
      name: transformer_layer.mlp_hyper_connection.bias
      is_direct_name: true
      ignore_tp: true
    mtp_hc_ffn_alpha_pre:
      name: transformer_layer.mlp_hyper_connection.alpha_pre
      is_direct_name: true
      ignore_tp: true
    mtp_hc_ffn_alpha_post:
      name: transformer_layer.mlp_hyper_connection.alpha_post
      is_direct_name: true
      ignore_tp: true
    mtp_hc_ffn_alpha_res:
      name: transformer_layer.mlp_hyper_connection.alpha_res
      is_direct_name: true
      ignore_tp: true
    mtp_name_prefix_for_layer: transformer_layer
tensor_parallel_dim:
  # linear_o_group_proj is a bare Parameter and stores TP-local output groups.
  "attention.wo_a.weight": 0
  "attention.wo_b.weight": 1
  "attention.attn_sink.weight": 0
  "mtp_e_proj.weight": 0
  "mtp_h_proj.weight": 0
torch_dtype: bfloat16
