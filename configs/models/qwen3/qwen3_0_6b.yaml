swiglu: true
attention_dropout: 0
hidden_dropout: 0
add_bias_linear: false
add_qkv_bias: false
qk_layernorm: true
untie_embeddings_and_output_weights: true
word_embeddings_for_head: "lm_head"
kv_channels: 128
num_experts: null
moe_ffn_hidden_size: null
rotary_emb_func: "RotaryEmbedding"
rotary_base: 1000000
model_type: "qwen"
# variable_seq_lengths: true

convert_file: ${oc.env:LOONGFORGE_PATH}/configs/models/qwen3/ckpt_convert/qwen3_convert.yaml