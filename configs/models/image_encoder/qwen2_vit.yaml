
_target_: loongforge.models.encoder.Qwen2VisionModelConfig

num_layers: 32
hidden_size: 1280
kv_channels: 80
ffn_hidden_size: 5120
patch_size: 14
num_attention_heads: 16
num_query_groups: 16
image_size: [1344, 1344]
activation_func: ${act:gelu}
