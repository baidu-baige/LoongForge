# llama2_7b model config
_target_: aiak_training_omni.models.foundation.LLaMAConfig

num_layers: 32
hidden_size: 4096
ffn_hidden_size: 11008
num_attention_heads: 32
vocab_size: 32000

# common default
group_query_attention: false
num_query_groups: null
position_embedding_type: "rope"
