defaults:
  # <folder_name>@<field_name>.<field_name>: <yaml_file_name>
  #- ../image_encoder@: base
  - _self_

# image_encoder:
model_name: qwen_vit

num_layers: 32

hidden_size: 1280

kv_channels: 80

ffn_hidden_size: 5120

patch_size: 14

num_attention_heads: 16

num_query_groups: 16

image_size: [1344, 1344]

normalization: LayerNorm

add_bias_linear: true

add_qkv_bias: true

swiglu: false

class_token_len: 0

group_query_attention: false

attention_dropout: 0.0

hidden_dropout: 0.0

layernorm_epsilon: 0

activation_func: quick_gelu  # Assuming quick_gelu is defined elsewhere

bias_activation_fusion: false

gated_linear_unit: false

in_channels: 3

position_embedding_type: "none"
