# hydra:
#   searchpath:
#     - file://configs/

defaults:
  - ../../models/image_encoder@model.image_encoder: intern_vit_6b
  - ../../models/image_projector@model.image_projector: intern_mlp_adapter
  - ../../models/internlm2.5@model.foundation: internlm2_5_20b
  - _self_

model:
  model_type: intern_vl
  loss_func: ${loss_func:loss_func_internvl}
  
  image_projector:
    hidden_size: 6144
    ffn_hidden_size: 6144
  foundation: 
    rotary_emb_func: "DynamicRotaryEmbedding"
    rotary_base: 50000000
    model_spec: ["loongforge.models.foundation.internlm.internlm_layer_spec", "get_internlm_layer_with_te_spec"]