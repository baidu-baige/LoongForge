model_name: qwen2.5_vl_7b
description: $model_name模型自动化
huggingface_path: https://huggingface.co/Qwen/Qwen2-VL-7B-Instruct
bos_path: bos:/cce-ai-models/huggingface.co/Qwen/Qwen2.5-VL-7B-Instruct
TOTAL_K8S_NODES: 1

MODEL_RUNNABLE: True # 表示模型是否支持运行, 或者 True / False

# aiak-training-omni 训练的参数
HF_CKPT_PATH: $pfs_path/huggingface.co/Qwen/Qwen2.5-VL-7B-Instruct/
PRETRAIN_DATA_PATH: $pfs_path/aiak-training-omni/dataset/llava_details-minigpt4_3500_formate/wds
SFT_DATA_PATH: $pfs_path/aiak-training-omni/dataset/test_packing/test_vqa_16k_packed_wds
TOKENIZER_PATH: $pfs_path/huggingface.co/Qwen/Qwen2.5-VL-7B-Instruct/
CHECKPOINT_PATH: $step1_output_path
TENSORBOARD_PATH: /workspace/tensorboard/$model_name.log
MODEL_CONFIG_PATH: $aiak_training_path/configs/models/qwen2.5vl/qwen2_5_vl_7b.yaml

# ckpt convert 相关配置
ENCODER_TENSOR_MODEL_PARALLER_SIZE: 4
DECODER_TENSOR_MODEL_PARALLER_SIZE: 4
NUM_VIRTUAL_STAGES_PER_PIPELINE_RANK: 2
CUSTOM_PIPELINE_LAYERS: 6,8,6,8
FOUNDATION_CONVERT_FILE: $aiak_training_path/configs/models/qwen2.5/ckpt_convert/qwen2_5_convert.yaml
IMAGE_ENCODER_CONVERT_FILE: $aiak_training_path/configs/models/image_encoder/ckpt_convert/qwen2_5_vit_convert.yaml
IMAGE_PROJECTOR_CONVERT_FILE: $aiak_training_path/configs/models/image_projector/ckpt_convert/qwen_mlp_adapter_convert.yaml

# 中间产物路径
LANGUAGE_MODEL_PATH: $step1_output_path/language-mcore
VISION_MODEL_PATH: $step1_output_path/vision-model-mcore
ADAPTER_PATH: $step1_output_path/adapter-mcore
PATCH_PATH: $step1_output_path/patch-mcore

# 训练参数
TENSOR_MODEL_PARALLER_SIZE: 4
PIPELINE_MODEL_PARALLER_SIZE: 2
log_interval: 1
micro_batch_size: 1
global_batch_size: 32
seq_length: 1024


scenarios:
  - function:
      pretrain:
        Step1:
          LANGUAGE_MODEL_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --config_file=${MODEL_CONFIG_PATH}
            --convert_file=${FOUNDATION_CONVERT_FILE}
            --tensor_model_parallel_size=${DECODER_TENSOR_MODEL_PARALLER_SIZE}
            --pipeline_model_parallel_size=${PIPELINE_MODEL_PARALLER_SIZE}
            --num-virtual-stages-per-pipeline-rank=${NUM_VIRTUAL_STAGES_PER_PIPELINE_RANK}
            --custom_pipeline_layers=${CUSTOM_PIPELINE_LAYERS}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${LANGUAGE_MODEL_PATH}
            --safetensors
            --no_save_optim
            --no_load_optim'
          VISION_MODEL_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --config_file=${MODEL_CONFIG_PATH}
            --convert_file=${IMAGE_ENCODER_CONVERT_FILE}
            --tensor_model_parallel_size=${ENCODER_TENSOR_MODEL_PARALLER_SIZE}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${VISION_MODEL_PATH}
            --safetensors
            --no_save_optim
            --no_load_optim'
          ADAPTER_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --config_file=${MODEL_CONFIG_PATH}
            --convert_file=${IMAGE_PROJECTOR_CONVERT_FILE}
            --tensor_model_parallel_size=${DECODER_TENSOR_MODEL_PARALLER_SIZE}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${ADAPTER_PATH}
            --safetensors
            --no_save_optim
            --no_load_optim'
          PATCH_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --config_file=${MODEL_CONFIG_PATH}
            --convert_file=${IMAGE_ENCODER_CONVERT_FILE}
            --tensor_model_parallel_size=${ENCODER_TENSOR_MODEL_PARALLER_SIZE}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${PATCH_PATH}
            --safetensors
            --no_save_optim
            --no_load_optim'
          MERGE_ARGS: '
            --megatron_path ${megatron_path}
            --language_model_path ${LANGUAGE_MODEL_PATH}/release
            --vision_model_path ${VISION_MODEL_PATH}/release
            --vision_patch ${PATCH_PATH}/release
            --adapter_path ${ADAPTER_PATH}/release
            --encoder_tensor_model_parallel_size ${ENCODER_TENSOR_MODEL_PARALLER_SIZE}
            --decoder_tensor_model_parallel_size ${DECODER_TENSOR_MODEL_PARALLER_SIZE}
            --pipeline_model_parallel_size ${PIPELINE_MODEL_PARALLER_SIZE}
            --save_ckpt_path ${CHECKPOINT_PATH}/release
            --num_virtual_stages_per_pipeline_rank=${NUM_VIRTUAL_STAGES_PER_PIPELINE_RANK}
            --config_file ${MODEL_CONFIG_PATH}'
        Step2:
          DATA_ARGS: '
            --tokenizer-type HFTokenizer
            --hf-tokenizer-path $TOKENIZER_PATH
            --data-path $PRETRAIN_DATA_PATH
            --dataloader-type external
            --split 100,0,0
            --num-workers 16
            --add-question-in-pretrain
            --enable-discard-sample '
          TRAINING_ARGS: '
            --norm-epsilon 1e-6
            --training-phase pretrain
            --seq-length ${seq_length}
            --max-position-embeddings 4096
            --init-method-std 0.02
            --micro-batch-size 1
            --global-batch-size ${global_batch_size}
            --lr 0.0002
            --min-lr 1.0e-5
            --clip-grad 1.0
            --weight-decay 0.01
            --optimizer adam
            --adam-beta1 0.9
            --adam-beta2 0.95
            --adam-eps 1e-05
            --train-iters ${train_iters}
            --lr-decay-iters 50000
            --lr-decay-style cosine
            --lr-warmup-fraction 0.002
            --initial-loss-scale 65536
            --bf16
            --save-interval 10000000
            --ckpt-format torch
            --dataloader-save ${CHECKPOINT_PATH}/dataloader'
            #--load $CHECKPOINT_PATH
            # --save ${step1_output_path}
          MODEL_PARALLEL_ARGS: '
            --attention-backend flash
            --tensor-model-parallel-size ${TENSOR_MODEL_PARALLER_SIZE}
            --pipeline-model-parallel-size ${PIPELINE_MODEL_PARALLER_SIZE}
            --num-virtual-stages-per-pipeline-rank 2
            --use-distributed-optimizer
            --overlap-grad-reduce
            --overlap-param-gather
            --custom-pipeline-layers 12,16
            --custom-pipeline-recompute-layers 12,16
            --distributed-backend nccl
            --recompute-granularity full
            --recompute-method block
            --recompute-num-layers 14
            --overlap-cpu-optimizer-d2h-h2d
            --use-precision-aware-optimizer'
            #--context-parallel-size 2
          MODEL_CONFIG_ARGS: '
            --config-file $MODEL_CONFIG_PATH'
          LOGGING_ARGS: '
            --log-interval ${log_interval}
            --tensorboard-dir $TENSORBOARD_PATH
            --log-timers-to-tensorboard'
      sft:
        Step2:
          DATA_ARGS: '
            --tokenizer-type HFTokenizer \
            --hf-tokenizer-path $TOKENIZER_PATH \
            --data-path $DATA_PATH
            --dataloader-type external
            --split 100,0,0
            --num-workers 16
            --chat-template qwen2-vl'
          TRAINING_ARGS: '
            --training-phase sft
            --seq-length 4096
            --max-position-embeddings 4096
            --init-method-std 0.02
            --micro-batch-size 1
            --global-batch-size 32
            --lr 0.0002
            --min-lr 1.0e-5
            --clip-grad 1.0
            --weight-decay 0.01
            --optimizer adam
            --adam-beta1 0.9
            --adam-beta2 0.95
            --adam-eps 1e-05
            --norm-epsilon 1e-6
            --train-iters 20
            --lr-decay-iters 50000
            --lr-decay-style cosine
            --lr-warmup-fraction 0.002
            --initial-loss-scale 65536
            --bf16
            --save $CHECKPOINT_PATH
            --save-interval 10000000
            --ckpt-format torch
            --dataloader-save ${CHECKPOINT_PATH}/dataloader
            --packing-sft-data'
            #--load $CHECKPOINT_PATH
          MODEL_PARALLEL_ARGS: '
            --attention-backend flash
            --pipeline-model-parallel-size 2
            --tensor-model-parallel-size 2
            --use-distributed-optimizer
            --overlap-grad-reduce
            --overlap-param-gather
            --distributed-backend nccl
            --recompute-granularity full
            --recompute-method block
            --recompute-num-layers 14'
            # --context-parallel-size 2
          MODEL_CONFIG_ARGS: '
            --config-file $MODEL_CONFIG_PATH'
          LOGGING_ARGS: '
            --log-interval 1
            --tensorboard-dir ${TENSORBOARD_PATH}
            --log-timers-to-tensorboard'

  - preprocess_data:
      vlm:
        PREPROCESS_DATA_PATH: ${aiak_training_path}/tools/data_preprocess/vlm/convert_to_webdataset.py
        output_prefix: /workspace/vlm_dataset_demo/$model_name
        train_json_file_name: '$scripts_root_path/datasets/vlm/mllm_demo.json'
        video_dir: '$scripts_root_path/datasets/vlm/'
        image_dir: '$scripts_root_path/datasets/vlm/'
        PREPROCESS_DATA_ARGS: '
          --output_dir ${output_prefix}
          --json_file ${train_json_file_name}
          --video_dir ${video_dir}
          --image_dir ${image_dir}
          --columns_messages messages
          --maxsize 10000000
          --sample_type vqa'
      offline_packing:
        PREPROCESS_DATA_PATH: ${aiak_training_path}/tools/data_preprocess/vlm/offline_packing/scripts/pack_wds.sh
        packing_config_path: '$aiak_training_path/tools/data_preprocess/vlm/offline_packing/config.yaml'
        PREPROCESS_DATA_ARGS: '$packing_config_path'

tasks:
  check_correctness_task: True
  check_precess_data_task: False
  