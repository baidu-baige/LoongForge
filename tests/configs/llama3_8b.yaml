model_name: llama3_8b
description: ${model_name}
huggingface_path: https://huggingface.co/meta-llama/Meta-Llama-3-8B
bos_path: bos:/ai-data/meta-llama/Meta-Llama-3-8B
TOTAL_K8S_NODES: 1

# Model Parameters
MODEL_RUNNABLE: True

# LoongForge training parameters
HF_CKPT_PATH: $pfs_path/huggingface.co/meta-llama/Meta-Llama-3-8B
DATA_PATH: $pfs_path/omni_datasets/LoongForge/llama2/pile_test/pile-llama_text_document
TOKENIZER_PATH: $pfs_path/huggingface.co/meta-llama/Meta-Llama-3-8B
CHECKPOINT_PATH: $step1_output_path
TENSORBOARD_PATH: /workspace/tensorboard/$model_name.log
MODEL_CONFIG_PATH: $LOONGFORGE_PATH/configs/models/llama3/llama3_1_8b.yaml
CONVERT_FILE: $LOONGFORGE_PATH/configs/models/llama3/ckpt_convert/llama3_convert.yaml

# Training Parameters
TENSOR_MODEL_PARALLER_SIZE: 2
PIPELINE_MODEL_PARALLER_SIZE: 2
log_interval: 1
initial_loss_scale: 65536
global_batch_size: 32

scenarios:
  - function:
      pretrain:
        Step1:
          RUNNABLE_FLAG: False
          CONVERT_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --config_file=${MODEL_CONFIG_PATH}
            --convert_file=${CONVERT_FILE}
            --tensor_model_parallel_size=${TENSOR_MODEL_PARALLER_SIZE}
            --pipeline_model_parallel_size=${PIPELINE_MODEL_PARALLER_SIZE}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${CHECKPOINT_PATH}
            --safetensors
            --no_save_optim
            --no_load_optim'
        Step2:
          MODEL_ARGS: '
            --model-name llama3-8b
            --rotary-base 500000'
          DATA_ARGS: '
            --tokenizer-type HFTokenizer
            --hf-tokenizer-path $TOKENIZER_PATH
            --data-path $DATA_PATH
            --split 949,50,1'
          TRAINING_ARGS: '
            --training-phase pretrain 
            --seq-length 4096
            --max-position-embeddings 4096
            --init-method-std 0.02
            --micro-batch-size 1
            --global-batch-size 32
            --lr 0.0002
            --min-lr 1.0e-5
            --clip-grad 1.0
            --weight-decay 0.01
            --optimizer adam
            --adam-beta1 0.9
            --adam-beta2 0.95
            --adam-eps 1e-05
            --norm-epsilon 1e-05
            --train-iters ${train_iters}
            --lr-decay-iters 50000
            --lr-decay-style cosine
            --lr-warmup-fraction 0.002
            --initial-loss-scale 65536
            --bf16
            --load $CHECKPOINT_PATH
            --save-interval 5000
            --eval-interval 1000
            --eval-iters 0
            --log-memory-stats'
          MODEL_PARALLEL_ARGS: '
            --tensor-model-parallel-size ${TENSOR_MODEL_PARALLER_SIZE}
            --pipeline-model-parallel-size ${PIPELINE_MODEL_PARALLER_SIZE}
            --context-parallel-size 2
            --context-parallel-size 2
            --use-distributed-optimizer
            --overlap-grad-reduce
            --overlap-param-gather
            --distributed-backend nccl
            --recompute-granularity full
            --recompute-method block
            --recompute-num-layers 16'
          LOGGING_ARGS: '
            --log-interval ${log_interval}
            --tensorboard-dir $TENSORBOARD_PATH
            --log-timers-to-tensorboard'
  - preprocess_data:
      llm_pretrain:
        PREPROCESS_DATA_PATH: ${LOONGFORGE_PATH}/tools/data_preprocess/llm/preprocess_pretrain_data.py
        output_prefix: /workspace/pile_test_pretrain/$model_name/pile-test
        train_json_file_name: '$scripts_root_path/datasets/llm/pretrain_train.jsonl'
        PREPROCESS_DATA_ARGS: '
          --input ${train_json_file_name}
          --output-prefix ${output_prefix}
          --tokenizer-type HFTokenizer
          --hf-tokenizer-path ${TOKENIZER_PATH}
          --json-keys text
          --workers 50
          --append-eod'

tasks:
  check_correctness_task: True
  check_precess_data_task: True