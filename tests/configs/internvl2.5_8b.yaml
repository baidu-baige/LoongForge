model_name: internvl2.5_8b
description: $model_name
huggingface_path: https://huggingface.co/OpenGVLab/InternVL2_5-8B
bos_path: bos:/ai-data/InternVL2_5-8B
TOTAL_K8S_NODES: 1

MODEL_RUNNABLE: True

# LoongForge training parameters
HF_CKPT_PATH: $pfs_path/huggingface.co/internvl/InternVL2_5-8B/
DATA_PATH: $pfs_path/omni_datasets/LoongForge/internvl2.5_8b/webdataset_image
TOKENIZER_PATH: $pfs_path/huggingface.co/internvl/InternVL2_5-8B/
CHECKPOINT_PATH: $step1_output_path
TENSORBOARD_PATH: /workspace/tensorboard/$model_name.log
MODEL_CONFIG_PATH: $LOONGFORGE_PATH/configs/models/internvl2.5/internvl2_5_8b.yaml
SFT_DATASET_CONFIG: $LOONGFORGE_PATH/configs/data/sft_dataset_config.yaml

# ckpt convert configuration
ENCODER_TENSOR_MODEL_PARALLER_SIZE: 4
DECODER_TENSOR_MODEL_PARALLER_SIZE: 4
FOUNDATION_CONVERT_FILE: $LOONGFORGE_PATH/configs/models/internlm2.5/ckpt_convert/internlm2_5_convert.yaml
IMAGE_ENCODER_CONVERT_FILE: $LOONGFORGE_PATH/configs/models/image_encoder/ckpt_convert/internvl_vit_0.3b_convert.yaml
IMAGE_PROJECTOR_CONVERT_FILE: $LOONGFORGE_PATH/configs/models/image_projector/ckpt_convert/intern_mlp_adapter_convert.yaml
LANGUAGE_MODEL_PATH: $step1_output_path/language-mcore
VISION_MODEL_PATH: $step1_output_path/vision-model-mcore
ADAPTER_PATH: $step1_output_path/adapter-mcore
PATCH_PATH: $step1_output_path/patch-mcore

# Training parameters

TENSOR_MODEL_PARALLER_SIZE: 4
PIPELINE_MODEL_PARALLER_SIZE: 2
NUM_VIRTUAL_STAGES_PER_PIPELINE_RANK: 2
CUSTOM_PIPELINE_LAYERS: 7,9,7,9
log_interval: 1
micro_batch_size: 1
global_batch_size: 32
seq_length: 16384


scenarios:
  - function:
      sft:
        Step1:
          RUNNABLE_FLAG: False
          LANGUAGE_MODEL_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --config_file=${MODEL_CONFIG_PATH}
            --convert_file=${FOUNDATION_CONVERT_FILE}
            --tensor_model_parallel_size=${DECODER_TENSOR_MODEL_PARALLER_SIZE}
            --pipeline_model_parallel_size=${PIPELINE_MODEL_PARALLER_SIZE}
            --num-virtual-stages-per-pipeline-rank=${NUM_VIRTUAL_STAGES_PER_PIPELINE_RANK}
            --custom_pipeline_layers=${CUSTOM_PIPELINE_LAYERS}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${LANGUAGE_MODEL_PATH}
            --safetensors
            --no_save_optim
            --no_load_optim'
          VISION_MODEL_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --config_file=${MODEL_CONFIG_PATH}
            --convert_file=${IMAGE_ENCODER_CONVERT_FILE}
            --tensor_model_parallel_size=${ENCODER_TENSOR_MODEL_PARALLER_SIZE}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${VISION_MODEL_PATH}
            --safetensors
            --no_save_optim
            --no_load_optim'
          ADAPTER_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --config_file=${MODEL_CONFIG_PATH}
            --convert_file=${IMAGE_PROJECTOR_CONVERT_FILE}
            --tensor_model_parallel_size=${DECODER_TENSOR_MODEL_PARALLER_SIZE}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${ADAPTER_PATH}
            --safetensors
            --no_save_optim
            --no_load_optim'
          PATCH_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --config_file=${MODEL_CONFIG_PATH}
            --convert_file=${IMAGE_ENCODER_CONVERT_FILE}
            --tensor_model_parallel_size=${ENCODER_TENSOR_MODEL_PARALLER_SIZE}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${PATCH_PATH}
            --safetensors
            --no_save_optim
            --no_load_optim'
          MERGE_ARGS: '
            --megatron_path ${megatron_path}
            --language_model_path ${LANGUAGE_MODEL_PATH}/release
            --vision_model_path ${VISION_MODEL_PATH}/release
            --vision_patch ${PATCH_PATH}/release
            --adapter_path ${ADAPTER_PATH}/release
            --encoder_tensor_model_parallel_size ${ENCODER_TENSOR_MODEL_PARALLER_SIZE}
            --decoder_tensor_model_parallel_size ${DECODER_TENSOR_MODEL_PARALLER_SIZE}
            --pipeline_model_parallel_size ${PIPELINE_MODEL_PARALLER_SIZE}
            --save_ckpt_path ${CHECKPOINT_PATH}/release
            --num_virtual_stages_per_pipeline_rank=${NUM_VIRTUAL_STAGES_PER_PIPELINE_RANK}
            --config_file ${MODEL_CONFIG_PATH}'
        Step2:
          DATA_ARGS: '
            --tokenizer-type HFTokenizer
            --hf-tokenizer-path $TOKENIZER_PATH
            --data-path $DATA_PATH
            --split 100,0,0
            --chat-template empty'
          TRAINING_ARGS: '
            --training-phase sft
            --seq-length ${seq_length}
            --max-position-embeddings ${seq_length}
            --max-packed-tokens ${seq_length}
            --init-method-std 0.01
            --micro-batch-size 1
            --global-batch-size ${global_batch_size}
            --lr 1e-5
            --min-lr 0.0
            --clip-grad 1.0
            --weight-decay 0.05
            --optimizer adam
            --adam-beta1 0.9
            --adam-beta2 0.999
            --adam-eps 1e-8
            --norm-epsilon 1e-6
            --attention-dropout 0
            --hidden-dropout 0
            --train-iters ${train_iters}
            --load $CHECKPOINT_PATH
            --eval-iters 0
            --lr-decay-style cosine
            --lr-warmup-fraction 0.03
            --bf16
            --seed 42
            --no-gradient-accumulation-fusion
            --save-interval 2000
            --exit-interval 500
            --dataloader-type external
            --variable-seq-lengths  
            --min-num-frame 8
            --max-num-frame 32
            --max-buffer-size 20
            --num-images-expected 48
            --loss-reduction square
            --use_thumbnail
            --replacement
            --dynamic-image-size
            --loss-reduction-all-gather
            --num-workers 8
            --dataloader-prefetch-factor 4
            --use-flash-attn
            --custom-pipeline-layers 14,18
            --custom-pipeline-recompute-layers 14,18
            --recompute-granularity full
            --recompute-method block
            --recompute-num-layers 12
            --sequence-parallel
            --strict-mode
            --conv-style internvl2_5
            --max-dynamic-patch 12
            --packing-sft-data
            --packing-buffer-size 20
            --energon-pack-algo sequential_max_images
            --allow-missing-adapter-checkpoint
            --log-memory-stats'
            # --save ${step1_output_path}
          MODEL_PARALLEL_ARGS: '
            --attention-backend flash
            --tensor-model-parallel-size ${TENSOR_MODEL_PARALLER_SIZE}
            --pipeline-model-parallel-size ${PIPELINE_MODEL_PARALLER_SIZE}
            --num-virtual-stages-per-pipeline-rank ${NUM_VIRTUAL_STAGES_PER_PIPELINE_RANK}
            --tp-comm-overlap
            --overlap-cpu-optimizer-d2h-h2d
            --use-precision-aware-optimizer
            --use-distributed-optimizer
            --context-parallel-size 1
            --distributed-backend nccl'
          MODEL_CONFIG_ARGS: '
            --config-file $MODEL_CONFIG_PATH'
          LOGGING_ARGS: '
            --log-interval ${log_interval}
            --tensorboard-dir $TENSORBOARD_PATH
            --log-timers-to-tensorboard'
          SFT_ARGS: '
            --sft-dataset-config $SFT_DATASET_CONFIG
            --sft-dataset multimodal_sharegpt'

tasks:
  check_correctness_task: True