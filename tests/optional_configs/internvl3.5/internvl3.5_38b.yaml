model_name: internvl3.5_38b
description: $model_name
huggingface_path: https://huggingface.co/OpenGVLab/InternVL3_5-38B
bos_path: bos:/ai-data/InternVL3_5-38B
TOTAL_K8S_NODES: 4
MODEL_RUNNABLE: False

# LoongForge training parameters
HF_CKPT_PATH: $pfs_path/huggingface.co/internvl/InternVL3_5-38B/
DATA_PATH: $pfs_path/omni_datasets/LoongForge/internvl2.5_8b/webdataset_image
TOKENIZER_PATH: $pfs_path/huggingface.co/internvl/InternVL3_5-38B/
CHECKPOINT_PATH: $save_mcore_ckpt_path_pre/internvl3.5/$model_name
TENSORBOARD_PATH: /workspace/tensorboard/$model_name.log
MODEL_CONFIG_PATH: $LOONGFORGE_PATH/configs/models/internvl3.5/internvl3_5_38b.yaml
SFT_DATASET_CONFIG: $LOONGFORGE_PATH/configs/data/sft_dataset_config.json

# ckpt convert configuration
ENCODER_TENSOR_MODEL_PARALLER_SIZE: 4
DECODER_TENSOR_MODEL_PARALLER_SIZE: 4
FOUNDATION_CONVERT_FILE: $LOONGFORGE_PATH/configs/models/qwen3/ckpt_convert/qwen3_convert_intern.yaml
IMAGE_ENCODER_CONVERT_FILE: $LOONGFORGE_PATH/configs/models/image_encoder/ckpt_convert/internvl_vit_6b_convert.yaml
IMAGE_PROJECTOR_CONVERT_FILE: $LOONGFORGE_PATH/configs/models/image_projector/ckpt_convert/intern_mlp_adapter_convert.yaml
LANGUAGE_MODEL_PATH: $CHECKPOINT_PATH/language-mcore
VISION_MODEL_PATH: $CHECKPOINT_PATH/vision-model-mcore
ADAPTER_PATH: $CHECKPOINT_PATH/adapter-mcore
PATCH_PATH: $CHECKPOINT_PATH/patch-mcore

# Training parameters
TENSOR_MODEL_PARALLER_SIZE: 4
PIPELINE_MODEL_PARALLER_SIZE: 2
CUSTOM_PIPELINE_LAYERS: 5,59
CUSTOM_PIPELINE_RECOMPUTE_LAYERS: 38,62
global_batch_size: 32
seq_length: 16384

scenarios:
  - function:
      sft:
        Step1:
          RUNNABLE_FLAG: "false"
          LANGUAGE_MODEL_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --config_file=${MODEL_CONFIG_PATH}
            --convert_file=${FOUNDATION_CONVERT_FILE}
            --tensor_model_parallel_size=${DECODER_TENSOR_MODEL_PARALLER_SIZE}
            --pipeline_model_parallel_size=${PIPELINE_MODEL_PARALLER_SIZE}
            --custom_pipeline_layers=${CUSTOM_PIPELINE_LAYERS}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${LANGUAGE_MODEL_PATH}
            --safetensors
            --no_save_optim
            --no_load_optim'
          VISION_MODEL_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --config_file=${MODEL_CONFIG_PATH}
            --convert_file=${IMAGE_ENCODER_CONVERT_FILE}
            --tensor_model_parallel_size=${ENCODER_TENSOR_MODEL_PARALLER_SIZE}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${VISION_MODEL_PATH}
            --safetensors
            --no_save_optim
            --no_load_optim'
          ADAPTER_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --config_file=${MODEL_CONFIG_PATH}
            --convert_file=${IMAGE_PROJECTOR_CONVERT_FILE}
            --tensor_model_parallel_size=${DECODER_TENSOR_MODEL_PARALLER_SIZE}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${ADAPTER_PATH}
            --safetensors
            --no_save_optim
            --no_load_optim'
          PATCH_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --config_file=${MODEL_CONFIG_PATH}
            --convert_file=${IMAGE_ENCODER_CONVERT_FILE}
            --tensor_model_parallel_size=${ENCODER_TENSOR_MODEL_PARALLER_SIZE}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${PATCH_PATH}
            --safetensors
            --no_save_optim
            --no_load_optim'
          MERGE_ARGS: '
            --megatron_path ${megatron_path}
            --language_model_path ${LANGUAGE_MODEL_PATH}/release
            --vision_model_path ${VISION_MODEL_PATH}/release
            --vision_patch ${PATCH_PATH}/release
            --adapter_path ${ADAPTER_PATH}/release
            --encoder_tensor_model_parallel_size ${ENCODER_TENSOR_MODEL_PARALLER_SIZE}
            --decoder_tensor_model_parallel_size ${DECODER_TENSOR_MODEL_PARALLER_SIZE}
            --pipeline_model_parallel_size ${PIPELINE_MODEL_PARALLER_SIZE}
            --save_ckpt_path ${CHECKPOINT_PATH}/release
            --config_file ${MODEL_CONFIG_PATH}'
        Step2:
          DATA_ARGS: '
            --tokenizer-type HFTokenizer
            --hf-tokenizer-path $TOKENIZER_PATH
            --data-path $DATA_PATH
            --split 100,0,0
            --chat-template empty'
          TRAINING_ARGS: '
            --training-phase sft
            --seq-length ${seq_length}
            --max-position-embeddings 40960
            --max-packed-tokens ${seq_length}
            --init-method-std 0.01
            --micro-batch-size 1
            --global-batch-size ${global_batch_size}
            --lr 1e-5
            --min-lr 0.0
            --clip-grad 1.0
            --weight-decay 0.05
            --optimizer adam
            --adam-beta1 0.9
            --adam-beta2 0.999
            --adam-eps 1e-8
            --norm-epsilon 1e-6
            --attention-dropout 0
            --hidden-dropout 0
            --train-iters 20
            --lr-decay-style cosine
            --lr-warmup-fraction 0.03
            --bf16
            --seed 42
            --no-gradient-accumulation-fusion
            --load $CHECKPOINT_PATH
            --save-interval 2000
            --exit-interval 500
            --dataloader-type external
            --variable-seq-lengths
            --min-num-frame 8
            --max-num-frame 32
            --max-buffer-size 20
            --num-images-expected 48
            --loss-reduction square
            --use_thumbnail
            --replacement
            --dynamic-image-size
            --loss-reduction-all-gather
            --num-workers 8
            --dataloader-prefetch-factor 4
            --manual-gc
            --manual-gc-interval 0
            --use-flash-attn
            --recompute-granularity full
            --recompute-method block
            --recompute-num-layers 62
            --sequence-parallel
            --strict-mode
            --conv-style internvl2_5
            --max-dynamic-patch 12
            --packing-sft-data
            --packing-buffer-size 20
            --energon-pack-algo sequential_max_images
            --allow-missing-adapter-checkpoint
            --log-memory-stats'
          MODEL_PARALLEL_ARGS: '
            --attention-backend flash
            --tensor-model-parallel-size 4
            --pipeline-model-parallel-size 2
            --custom-pipeline-layers ${CUSTOM_PIPELINE_LAYERS}
            --custom-pipeline-recompute-layers ${CUSTOM_PIPELINE_RECOMPUTE_LAYERS}
            --use-distributed-optimizer
            --context-parallel-size 1
            --distributed-backend nccl
            --optimizer-cpu-offload
            --optimizer-offload-fraction 1.0
            --use-precision-aware-optimizer
            --overlap-cpu-optimizer-d2h-h2d'
          MODEL_CONFIG_ARGS: '
            --config-file $MODEL_CONFIG_PATH
            --rotary-seq-len-interpolation-factor 1'
          LOGGING_ARGS: '
            --log-interval 1
            --tensorboard-dir ${TENSORBOARD_PATH}
            --log-timers-to-tensorboard'
          SFT_ARGS: '
            --sft-dataset-config $SFT_DATASET_CONFIG'

tasks:
  check_correctness_task: True
