model_name: internvl3.5_30b_a3b
description: $model_name模型自动化
huggingface_path: https://huggingface.co/OpenGVLab/InternVL3_5-30B-A3B
bos_path: bos:/cce-ai-models/models/InternVL3_5-30B-A3B
TOTAL_K8S_NODES: 1

MODEL_RUNNABLE: True # 表示模型是否支持运行, 或者 True / False

# aiak-training-omni 训练的参数

HF_CKPT_PATH: $pfs_path/models/InternVL3_5-30B-A3B/
DATA_PATH: /mnt/cluster/aiak-training-omni/dataset/internvl/webdataset_video
TOKENIZER_PATH: $pfs_path/models/InternVL3_5-30B-A3B/
CHECKPOINT_PATH: $step1_output_path
TENSORBOARD_PATH: /workspace/tensorboard/$model_name.log
MODEL_CONFIG_PATH: $aiak_training_path/configs/models/internvl3.5/internvl3_5_30b_a3b.yaml

# ckpt convert 相关配置
ENCODER_TENSOR_MODEL_PARALLER_SIZE: 2
DECODER_TENSOR_MODEL_PARALLER_SIZE: 2
EXPERT_PARALLEL_SIZE: 4
EXPERT_TENSOR_PARALLEL_SIZE: 1
FOUNDATION_CONVERT_FILE: $aiak_training_path/configs/models/qwen3/ckpt_convert/qwen3_moe_convert_intern.yaml
IMAGE_ENCODER_CONVERT_FILE: $aiak_training_path/configs/models/image_encoder/ckpt_convert/internvl_vit_0.3b_convert.yaml
IMAGE_PROJECTOR_CONVERT_FILE: $aiak_training_path/configs/models/image_projector/ckpt_convert/intern_mlp_adapter_convert.yaml
LANGUAGE_MODEL_PATH: $step1_output_path/language-mcore
VISION_MODEL_PATH: $step1_output_path/vision-model-mcore
ADAPTER_PATH: $step1_output_path/adapter-mcore
PATCH_PATH: $step1_output_path/patch-mcore

# 训练参数
TENSOR_MODEL_PARALLER_SIZE: 4
PIPELINE_MODEL_PARALLER_SIZE: 2
NUM_EXPERTS: 128
log_interval: 1
micro_batch_size: 1
global_batch_size: 32
seq_length: 16384


scenarios:
  - function:
      sft:
        Step1:
          LANGUAGE_MODEL_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --config_file=${MODEL_CONFIG_PATH}
            --convert_file=${FOUNDATION_CONVERT_FILE}
            --tensor_model_parallel_size=${DECODER_TENSOR_MODEL_PARALLER_SIZE}
            --pipeline_model_parallel_size=${PIPELINE_MODEL_PARALLER_SIZE}
            --num_experts=${NUM_EXPERTS}
            --expert_parallel_size=${EXPERT_PARALLEL_SIZE}
            --expert_tensor_parallel_size=${EXPERT_TENSOR_PARALLEL_SIZE}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${LANGUAGE_MODEL_PATH}
            --safetensors
            --no_save_optim
            --no_load_optim'
          VISION_MODEL_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --config_file=${MODEL_CONFIG_PATH}
            --convert_file=${IMAGE_ENCODER_CONVERT_FILE}
            --tensor_model_parallel_size=${ENCODER_TENSOR_MODEL_PARALLER_SIZE}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${VISION_MODEL_PATH}
            --safetensors
            --no_save_optim
            --no_load_optim'
          ADAPTER_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --config_file=${MODEL_CONFIG_PATH}
            --convert_file=${IMAGE_PROJECTOR_CONVERT_FILE}
            --tensor_model_parallel_size=${DECODER_TENSOR_MODEL_PARALLER_SIZE}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${ADAPTER_PATH}
            --safetensors
            --no_save_optim
            --no_load_optim'
          PATCH_ARGS: '
            --load_platform=huggingface
            --save_platform=mcore
            --config_file=${MODEL_CONFIG_PATH}
            --convert_file=${IMAGE_ENCODER_CONVERT_FILE}
            --tensor_model_parallel_size=${ENCODER_TENSOR_MODEL_PARALLER_SIZE}
            --load_ckpt_path=${HF_CKPT_PATH}
            --save_ckpt_path=${PATCH_PATH}
            --safetensors
            --no_save_optim
            --no_load_optim'
          MERGE_ARGS: '
            --megatron_path ${megatron_path}
            --language_model_path ${LANGUAGE_MODEL_PATH}/release
            --vision_model_path ${VISION_MODEL_PATH}/release
            --vision_patch ${PATCH_PATH}/release
            --adapter_path ${ADAPTER_PATH}/release
            --encoder_tensor_model_parallel_size ${ENCODER_TENSOR_MODEL_PARALLER_SIZE}
            --decoder_tensor_model_parallel_size ${DECODER_TENSOR_MODEL_PARALLER_SIZE}
            --pipeline_model_parallel_size ${PIPELINE_MODEL_PARALLER_SIZE}
            --expert_parallel_size=${EXPERT_PARALLEL_SIZE}
            --save_ckpt_path ${CHECKPOINT_PATH}/release
            --config_file ${MODEL_CONFIG_PATH}'
        Step2:
          DATA_ARGS: '
            --tokenizer-type HFTokenizer
            --hf-tokenizer-path $TOKENIZER_PATH
            --data-path $DATA_PATH
            --split 100,0,0
            --chat-template empty'
          TRAINING_ARGS: '
            --training-phase sft
            --seq-length 16384
            --max-position-embeddings 40960
            --max-packed-tokens 16384
            --init-method-std 0.01
            --micro-batch-size 1
            --global-batch-size 32
            --lr 1e-5
            --min-lr 0.0
            --clip-grad 1.0
            --weight-decay 0.05
            --optimizer adam
            --adam-beta1 0.9
            --adam-beta2 0.999
            --adam-eps 1e-8
            --norm-epsilon 1e-6
            --attention-dropout 0
            --hidden-dropout 0
            --train-iters ${train_iters}
            --lr-decay-style cosine
            --lr-warmup-fraction 0.03
            --bf16
            --seed 42
            --no-gradient-accumulation-fusion
            --exit-interval 500
            --dataloader-type external
            --variable-seq-lengths 
            --min-num-frame 8
            --max-num-frame 32
            --max-buffer-size 20
            --num-images-expected 48
            --loss-reduction square
            --use-packed-ds
            --use_thumbnail
            --replacement
            --dynamic-image-size
            --loss-reduction-all-gather
            --num-workers 8
            --dataloader-prefetch-factor 4
            --manual-gc
            --manual-gc-interval 0
            --use-flash-attn
            --recompute-granularity full
            --recompute-method block
            --recompute-num-layers 45
            --sequence-parallel
            --strict-mode
            --conv-style internvl2_5
            --max-dynamic-patch 12
            --packing-sft-data
            --packing-batch-size 200
            --energon-pack-algo sequential_max_images
            --allow-missing-adapter-checkpoint'
            #--load $CHECKPOINT_PATH
            # --save ${step1_output_path}
          MODEL_PARALLEL_ARGS: '
            --attention-backend flash
            --tensor-model-parallel-size ${TENSOR_MODEL_PARALLER_SIZE}
            --pipeline-model-parallel-size ${PIPELINE_MODEL_PARALLER_SIZE}
            --expert-model-parallel-size ${EXPERT_PARALLEL_SIZE}
            --expert-tensor-parallel-size ${EXPERT_TENSOR_PARALLEL_SIZE}
            --moe-token-dispatcher-type alltoall
            --use-distributed-optimizer
            --context-parallel-size 1
            --distributed-backend nccl
            --optimizer-cpu-offload
            --use-precision-aware-optimizer
            --optimizer-offload-fraction 0.2
            --overlap-cpu-optimizer-d2h-h2d'
          MOE_ARGS: '
            --moe-router-load-balancing-type aux_loss
            --moe-router-topk 8
            --moe-aux-loss-coeff 1e-2
            --moe-grouped-gemm
            --moe-router-dtype fp32
            --empty-unused-memory-level 2'
          MODEL_CONFIG_ARGS: '
            --config-file $MODEL_CONFIG_PATH'
          LOGGING_ARGS: '
            --log-interval ${log_interval}
            --tensorboard-dir $TENSORBOARD_PATH
            --log-timers-to-tensorboard'
          SFT_ARGS: '
            --sft-dataset-config /mnt/cluster/cyw/E2E/AIAK-Training-Omni/configs/data/sft_dataset_config.json'
          loss_in_value: '[
              1.941948E+00
              1.921066E+00
              1.916282E+00
              1.702542E+00
              1.243891E+00
              9.119769E-01
              6.227867E-01
              2.897384E-01
              2.008902E-01
              2.232531E-01
            ]'

tasks:
  check_correctness_task: True
  check_perfness_task: False