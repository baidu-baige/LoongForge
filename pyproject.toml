[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "AIAK-Training-Omni"
version = "0.1.0"
description = "AIAK-Training-Omni framework: an all-scenario training framework"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
    { name = "zhanghenghua", email = "zhanghenghua@baidu.com" }
]
keywords = ["baidu", "omni", "training", "megatron"]
classifiers = [
    "Private :: Do Not Upload",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence"
]
dependencies = [
    "build>=1.0.3"
]

[project.optional-dependencies]
test = [
    "pytest",
    "mock"
]

[project.urls]
Homepage = "http://icode.baidu.com/repos/baidu/hac-aiacc/AIAK-Training-Omni/tree/master"
Changelog = "CHANGELOG.md"

[project.scripts]
AIAK-Training-Omni = "aiak_training_omni.train:main"

[tool.hatch.build]
packages = ["aiak_training_omni"]
include = [
    "aiak_training_omni/conf/*",
    "aiak_training_omni/data/*",
    "aiak_training_omni/**/*.yaml",
    "aiak_training_omni/**/*.json"
]

[tool.hatch.build.targets.wheel]
packages = ["aiak_training_omni"]
output-dir = "output/dist"

[tool.hatch.build.targets.sdist]
output-dir = "output/dist"
